services:
  - type: web
    name: fake-news-detector-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PATH
        value: fake_news_model.pkl
      - key: VECTORIZER_PATH
        value: tfidf_vectorizer.pkl
